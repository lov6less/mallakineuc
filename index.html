<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Malla Interactiva Kinesiología UC
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- Destellos -->
    <div id="stars"></div>


    <!-- Encabezado -->
    <header>

        <h1>

            Malla Interactiva Kinesiología UC

        </h1>

        <p>

            Pontificia Universidad Católica de Chile

        </p>

    </header>


    <!-- Estadísticas superiores -->
    <section id="stats">

        <div class="stat-card">

            <div id="aprobados">

                0

            </div>

            <span>

                Aprobados

            </span>

        </div>


        <div class="stat-card">

            <div id="disponibles">

                0

            </div>

            <span>

                Disponibles

            </span>

        </div>


        <div class="stat-card">

            <div id="bloqueados">

                0

            </div>

            <span>

                Bloqueados

            </span>

        </div>

    </section>


    <!-- Barra de progreso general -->
    <section id="progress-section">

        <div id="contador-ramos">

            0 / 0 ramos aprobados

        </div>


        <div id="progress-container">

            <div id="progress-bar">

            </div>

        </div>


        <div id="porcentaje-total">

            0%

        </div>

    </section>


    <!-- Malla -->
    <main id="malla-container">

    </main>


    <!-- Progreso por semestre -->
    <section id="semester-progress-container">

    </section>


    <!-- Tooltip -->
    <div id="tooltip">

        <div id="tooltip-content">

        </div>

    </div>


    <!-- Popup internados -->
    <div id="internado-popup">

        🎓 ¡Internados desbloqueados!

    </div>


    <!-- Botones flotantes -->
    <div id="floating-buttons">

        <button id="dark-mode-btn">

            🌙

        </button>


        <button id="save-btn">

            💾

        </button>


        <button id="reset-btn">

            🔄

        </button>

    </div>


    <!-- Importar progreso -->
    <input

        type="file"

        id="import-file"

        accept=".json"

        hidden

    >


    <script src="script.js"></script>

</body>

</html>
