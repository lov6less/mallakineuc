<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Interactiva Kinesiología UC 🩷🩵</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Fondo -->
    <div class="stars"></div>

    <!-- Encabezado -->
    <header>

        <h1>Malla Interactiva Kinesiología UC 🩷🩵</h1>

        <div class="top-buttons">

            <button id="theme-toggle">
                🌙 Modo oscuro
            </button>

            <button id="reset-btn">
                ♻️ Reiniciar
            </button>

        </div>

        <!-- Buscador -->
        <div class="search-container">

            <input
                type="text"
                id="search-input"
                placeholder="🔍 Buscar ramo por nombre o código..."
            >

        </div>

        <!-- Barra general -->
        <div class="progress-section">

            <h3 id="contador-ramos">
                0 / 0 ramos aprobados
            </h3>

            <div class="progress-bar-container">

                <div id="progress-bar"></div>

            </div>

            <p id="porcentaje-total">
                0%
            </p>

        </div>

    </header>


    <!-- Estadísticas -->

    <section class="stats">

        <div class="stat-card">

            <span id="aprobados">
                0
            </span>

            <p>📚 Aprobados</p>

        </div>


        <div class="stat-card">

            <span id="disponibles">
                0
            </span>

            <p>🩵 Disponibles</p>

        </div>


        <div class="stat-card">

            <span id="bloqueados">
                0
            </span>

            <p>🔒 Bloqueados</p>

        </div>

    </section>


    <!-- Malla -->

    <main>

        <div id="malla-container">

            <!-- Se genera automáticamente -->

        </div>

    </main>


    <!-- Popup internados -->

    <div id="internado-popup">

        <h2>
            🎓 ¡Felicitaciones!
        </h2>

        <p>

            Has desbloqueado los internados de
            9° y 10° semestre.

        </p>

    </div>


    <!-- Tooltip -->

    <div id="tooltip">

        <h4>

            Prerrequisitos

        </h4>

        <div id="tooltip-content">

        </div>

    </div>


    <!-- Progreso por semestre -->

    <section class="semester-progress">

        <h2>

            📈 Progreso por semestre

        </h2>

        <div id="semester-progress-container">

        </div>

    </section>


    <!-- Botón volver arriba -->

    <button id="back-to-top">

        ⬆

    </button>


    <footer>

        <p>

            Hecho con 🩷 y 🩵 para Kinesiología UC

        </p>

    </footer>


    <script src="script.js"></script>

</body>
</html>
