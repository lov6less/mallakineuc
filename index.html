<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Malla Interactiva Kinesiología UC
    </title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Destellos -->
    <div id="stars"></div>


    <!-- Botones flotantes -->
    <div id="floating-buttons">

        <button
            id="theme-toggle"
            title="Modo oscuro">

            🌙

        </button>


        <button
            id="reset-button"
            title="Reiniciar malla">

            🔄

        </button>


        <button
            id="export-button"
            title="Exportar progreso">

            💾

        </button>


        <label
            id="import-button"
            title="Importar progreso">

            📂

            <input
                type="file"
                id="import-file"
                accept=".json"
                hidden>

        </label>

    </div>


    <div class="container">

        <header>

            <h1>

                Malla Interactiva Kinesiología UC

            </h1>

            <p>

                Marca los ramos aprobados
                y desbloquea automáticamente
                los siguientes.

            </p>

        </header>


        <!-- Progreso general -->
        <section id="progress-section">

            <div id="contador-ramos">

                0 / 0 ramos aprobados

            </div>


            <div class="progress-container">

                <div id="progress-bar">

                </div>

            </div>


            <div id="porcentaje-total">

                0%

            </div>

        </section>


        <!-- Estadísticas -->
        <section id="stats">

            <div>

                ✅ Aprobados:
                <span id="aprobados">

                    0

                </span>

            </div>


            <div>

                🩵 Disponibles:
                <span id="disponibles">

                    0

                </span>

            </div>


            <div>

                🔒 Bloqueados:
                <span id="bloqueados">

                    0

                </span>

            </div>

        </section>


        <!-- Malla -->
        <main id="malla-container">

        </main>


        <!-- Tooltip -->
        <div id="tooltip">

            <div id="tooltip-content">

            </div>

        </div>


        <!-- Popup internados -->
        <div id="internado-popup">

            🎉 ¡Has desbloqueado los internados!

        </div>


        <!-- Progreso por semestre -->
        <section id="semester-progress-section">

            <h2>

                Progreso por semestre

            </h2>

            <div id="semester-progress-container">

            </div>

        </section>

    </div>


    <!-- Volver arriba -->
    <button
        id="back-to-top"
        title="Volver arriba">

        ⬆️

    </button>


    <script src="script.js"></script>

</body>

</html>
